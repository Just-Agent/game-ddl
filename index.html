<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>电竞赛事与游戏版本 DDL · Just-DDL Network</title>
<meta name="description" content="电竞赛事、游戏版本更新、官方 patch schedule、历史版本节点和预测窗口追踪。">
<style>
:root{--accent:#e11d48;--accent2:#0ea5e9;--ink:#071225;--muted:#5d6b85;--line:#dbe5f2;--soft:#f8fafc;--paper:#fff}
*{box-sizing:border-box}body{margin:0;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;color:var(--ink);background:linear-gradient(180deg,#fff7fb 0%,#f8fbff 48%,#ecfeff 100%);letter-spacing:0}button,input{font:inherit}
header{position:sticky;top:0;z-index:20;border-bottom:1px solid var(--line);background:rgba(255,255,255,.9);backdrop-filter:blur(18px)}.nav,main,footer{width:min(1180px,calc(100% - 32px));margin:0 auto}.nav{height:66px;display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);font-weight:950}.logo{display:grid;place-items:center;width:34px;height:34px;border-radius:12px;background:#111827;color:#fff}.links,.seg{display:flex;gap:8px;flex-wrap:wrap}.links a,.btn,.seg button{display:inline-flex;align-items:center;justify-content:center;gap:7px;min-height:40px;padding:0 14px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--ink);font-weight:850;text-decoration:none;cursor:pointer}.seg{padding:4px;border:1px solid var(--line);border-radius:16px;background:#fff}.seg button{min-height:34px;border:0;background:transparent;color:#56657d}.seg button.active{background:var(--accent);color:#fff}
.hero{display:grid;grid-template-columns:minmax(0,1.04fr) minmax(320px,.96fr);gap:28px;padding:56px 0 30px;align-items:stretch}.eyebrow{font-size:14px;color:#be123c;font-weight:950;letter-spacing:.14em;text-transform:uppercase}h1{font-size:clamp(42px,7vw,74px);line-height:.98;margin:14px 0 18px}.lead{font-size:19px;line-height:1.75;color:#43506b;max-width:810px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:28px}.stat,.board,.event{background:var(--paper);border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 48px rgba(15,23,42,.07)}.stat{padding:18px}.stat strong{display:block;font-size:28px}.stat span{color:var(--muted);font-weight:760}.board{padding:22px;background:linear-gradient(135deg,#fff 0%,#fff1f2 46%,#e0f2fe 100%)}.board h2{margin:0 0 14px}.topic-tabs{display:grid;gap:10px}.topic-tab{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.82);padding:14px;text-align:left;cursor:pointer}.topic-tab strong{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:18px}.topic-tab span{display:block;margin-top:5px;color:var(--muted);line-height:1.5}.topic-tab.active{border-color:var(--tone);box-shadow:0 0 0 4px color-mix(in srgb,var(--tone) 13%,transparent)}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin:24px 0 16px}.toolbar h2{margin:0;font-size:30px}.toolbar-actions{display:flex;align-items:center;gap:10px;flex-wrap:wrap}.pill{border-radius:999px;background:#fff;color:#45546f;border:1px solid var(--line);font-weight:900;padding:9px 13px}.search{min-height:42px;width:min(340px,100%);border:1px solid var(--line);border-radius:14px;padding:0 14px;background:#fff;color:var(--ink);font-weight:800}.events.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.events.list{display:grid;gap:14px}.event{overflow:hidden;display:flex;transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease}.event:hover{transform:translateY(-2px);border-color:color-mix(in srgb,var(--tone) 42%,var(--line));box-shadow:0 24px 64px color-mix(in srgb,var(--tone) 16%,transparent)}.events.grid .event{min-height:470px;flex-direction:column}.events.list .event{min-height:184px;flex-direction:row}
.preview{position:relative;isolation:isolate;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;padding:18px;text-decoration:none;color:#fff;background:radial-gradient(circle at 78% 8%,color-mix(in srgb,var(--tone) 70%,#fff) 0,transparent 28%),linear-gradient(135deg,var(--tone),color-mix(in srgb,var(--tone) 52%,#111827));overflow:hidden}.events.grid .preview{min-height:166px}.events.list .preview{width:300px;min-width:300px}.domain{font-size:12px;letter-spacing:.16em;text-transform:uppercase;font-weight:950;opacity:.9}.source-title{font-size:26px;line-height:1.04;font-weight:950;max-width:240px}.source-chip{max-width:calc(100% - 56px);border-radius:999px;padding:7px 10px;background:rgba(255,255,255,.92);color:#0f172a;font-weight:950;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.open{display:grid;place-items:center;width:38px;height:38px;border-radius:999px;background:rgba(255,255,255,.93);color:var(--tone);font-weight:950}.body{display:flex;flex:1;flex-direction:column;gap:13px;padding:20px}.kicker{display:flex;align-items:center;gap:8px;flex-wrap:wrap;color:#53627e;font-size:13px;font-weight:900}.stage{border-radius:999px;padding:4px 9px;background:color-mix(in srgb,var(--tone) 13%,#fff);color:var(--tone)}.event h3{font-size:22px;line-height:1.22;margin:0}.desc{color:#4c5d7a;line-height:1.58}.countdown{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.unit{border:1px solid var(--line);border-radius:14px;background:#f8fafc;padding:11px}.unit strong{display:block;font-size:25px}.unit span{font-size:13px;color:#53627e;font-weight:850}.tba{border:1px solid #bae6fd;background:#f0f9ff;color:#0369a1;border-radius:14px;padding:16px;font-weight:950}.tags{display:flex;gap:8px;flex-wrap:wrap}.tag{border-radius:999px;padding:6px 10px;background:color-mix(in srgb,var(--tone) 10%,#fff);font-size:12px;font-weight:850}.actions{display:flex;gap:10px;align-items:center;margin-top:auto}.actions .btn.primary{background:var(--tone);border-color:transparent;color:#fff}.empty{padding:34px;border:1px dashed var(--line);border-radius:20px;color:var(--muted);font-weight:850}footer{margin-top:48px;border-top:1px solid var(--line);padding:26px 0 48px;text-align:center;color:var(--muted)}footer strong{color:#0f766e}
@media(max-width:980px){.hero{grid-template-columns:1fr;padding-top:38px}.events.grid{grid-template-columns:repeat(2,minmax(0,1fr))}.events.list .event{flex-direction:column}.events.list .preview{width:100%;min-width:0;min-height:170px}.stats{grid-template-columns:1fr}}
@media(max-width:680px){.nav{height:auto;padding:12px 0;align-items:flex-start;flex-direction:column}.events.grid{grid-template-columns:1fr}.toolbar-actions,.search,.seg{width:100%}.seg button{flex:1}.countdown{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<header><nav class="nav"><a class="brand" href="https://just-agent.github.io/just-ddl/"><span class="logo">J</span> Just-DDL Network</a><div class="links"><a href="https://just-agent.github.io/just-ddl/#/topic/game-ddl">Hub</a><a href="https://github.com/Just-Agent/game-ddl">GitHub</a></div></nav></header>
<main>
  <section class="hero">
    <div>
      <div class="eyebrow">Game DDL</div>
      <h1>电竞赛事与游戏版本</h1>
      <p class="lead">电竞赛事、游戏版本更新和官方 patch schedule 追踪。官方日期进入倒计时，已发布版本进入历史时间线，未官宣下一年度版本只显示预测窗口。</p>
      <div class="stats">
        <div class="stat"><strong id="itemCount">-</strong><span>节点</span></div>
        <div class="stat"><strong id="sourceCount">-</strong><span>来源</span></div>
        <div class="stat"><strong id="nextDays">-</strong><span>下一条官方倒计时</span></div>
      </div>
    </div>
    <aside class="board">
      <h2>专题族</h2>
      <div class="topic-tabs" id="topicTabs"></div>
    </aside>
  </section>

  <div class="toolbar">
    <div>
      <h2>全部节点</h2>
      <div class="desc">赛事、版本倒计时、历史版本和预测窗口分开展示，预测不等于官方日期</div>
    </div>
    <div class="toolbar-actions">
      <span class="pill" id="filterLabel">全部项目</span>
      <input class="search" id="search" type="search" placeholder="搜索赛事、版本、来源...">
      <div class="seg" aria-label="展示方式">
        <button type="button" data-view="list">长卡列表</button>
        <button type="button" data-view="grid">多列卡片</button>
      </div>
    </div>
  </div>
  <section class="events grid" id="events"></section>
</main>
<footer>Game DDL is part of Just-DDL Network. <strong>微信小程序版本即将上线，敬请期待</strong><div>数据仅供参考，请以官方信息为准。</div></footer>
<script>
const topics={
  all:{name:'全部',tone:'#e11d48',desc:'电竞赛事和游戏版本节点'},
  'game-ddl':{name:'电竞赛事',tone:'#e11d48',desc:'LoL、王者荣耀、VALORANT、CS2、Dota 2 与 EWC'},
  'game-version-ddl':{name:'游戏版本',tone:'#0ea5e9',desc:'LoL / TFT 官方 patch schedule、历史版本和预测窗口'}
};
const styles={
  'league-of-legends':{name:'英雄联盟',icon:'LOL',tone:'#2563eb'},
  'teamfight-tactics':{name:'云顶之弈',icon:'TFT',tone:'#0ea5e9'},
  'honor-of-kings':{name:'王者荣耀',icon:'HOK',tone:'#dc2626'},
  valorant:{name:'VALORANT',icon:'VCT',tone:'#e11d48'},
  cs2:{name:'CS2',icon:'CS2',tone:'#d97706'},
  dota2:{name:'Dota 2',icon:'D2',tone:'#7c2d12'},
  'multi-title':{name:'综合电竞',icon:'EWC',tone:'#7c3aed'},
  other:{name:'其他',icon:'DDL',tone:'#64748b'}
};
let items=[],selected=location.hash.replace('#','')||'all',query='',viewMode=localStorage.getItem('game-ddl-view-mode')||'grid';
function kind(item){if(item.type==='forecastWindow'||item.estimatedNextWindow)return'forecast';if(item.type==='historyEvent'||item.type==='officialRelease'||item.status==='ended')return'history';if(item.isDatePlaceholder)return'placeholder';return'official'}
function dateValue(item){const type=kind(item);if(type==='official')return new Date(item.deadline).getTime();if(type==='forecast')return new Date(item.estimatedNextWindow?.start||item.lastOfficialDate).getTime();if(type==='history')return new Date(item.date||item.deadline).getTime();return Number.POSITIVE_INFINITY}
function rank(item){return{official:0,forecast:1,placeholder:2,history:3}[kind(item)]??4}
function parts(item){const diff=Math.max(0,dateValue(item)-Date.now());return{d:Math.floor(diff/86400000),h:Math.floor(diff/3600000)%24,m:Math.floor(diff/60000)%60}}
function daysSince(value){return Math.max(0,Math.floor((Date.now()-new Date(value).getTime())/86400000))}
function fmtDate(value){if(!value)return'待官方公告';return new Date(value).toLocaleDateString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit'})}
function fmtWindow(item){return item.estimatedNextWindow?`${fmtDate(item.estimatedNextWindow.start)} - ${fmtDate(item.estimatedNextWindow.end)}`:item.dateRange}
function domain(url){try{return new URL(url).hostname.replace(/^www\./,'')}catch{return'official source'}}
function styleOf(item){return styles[item.subtopic]||styles.other}
function labelOf(item){return item.topicId==='game-version-ddl'?'游戏版本':'电竞赛事'}
async function loadJson(path){const res=await fetch(path,{cache:'no-store'});if(!res.ok)return[];const value=await res.json();return Array.isArray(value)?value:[]}
async function load(){
  const [events,versions]=await Promise.all([loadJson('public-data/items.json'),loadJson('public-data/game-version-ddl/items.json')]);
  items=[...events.map(item=>({...item,topicId:item.topicId||'game-ddl'})),...versions.map(item=>({...item,topicId:item.topicId||'game-version-ddl'}))].sort((a,b)=>rank(a)-rank(b)||dateValue(a)-dateValue(b));
  if(!topics[selected])selected='all';
  render();
}
function renderTabs(){
  const el=document.getElementById('topicTabs');
  el.innerHTML=Object.entries(topics).map(([id,topic])=>{
    const count=id==='all'?items.length:items.filter(item=>item.topicId===id).length;
    return `<button class="topic-tab ${selected===id?'active':''}" style="--tone:${topic.tone}" data-topic="${id}"><strong>${topic.name}<em>${count} 条</em></strong><span>${topic.desc}</span></button>`;
  }).join('');
  el.querySelectorAll('[data-topic]').forEach(btn=>btn.addEventListener('click',()=>{selected=btn.dataset.topic;location.hash=selected==='all'?'':selected;render()}));
}
function filtered(){
  const q=query.trim().toLowerCase();
  return items.filter(item=>{
    if(selected!=='all'&&item.topicId!==selected)return false;
    if(!q)return true;
    return[item.title,item.description,item.source,item.location,item.subtopicName,...(item.tags||[])].join(' ').toLowerCase().includes(q);
  }).sort((a,b)=>rank(a)-rank(b)||dateValue(a)-dateValue(b));
}
function renderStats(list){
  document.getElementById('itemCount').textContent=list.length;
  document.getElementById('sourceCount').textContent=new Set(list.map(item=>item.source)).size;
  const next=list.find(item=>kind(item)==='official'&&dateValue(item)>=Date.now());
  document.getElementById('nextDays').textContent=next?`${Math.ceil((dateValue(next)-Date.now())/86400000)} 天`:'-';
  document.getElementById('filterLabel').textContent=topics[selected]?.name||'全部项目';
}
function timePanel(item,cd){
  const type=kind(item);
  if(type==='history'){const date=item.date||item.deadline;return`<div class="tba">历史节点 · ${fmtDate(date)} · 距今 ${daysSince(date)} 天</div>`}
  if(type==='forecast')return`<div class="tba">预测窗口 · ${fmtWindow(item)} · 距最近官方节点 ${daysSince(item.lastOfficialDate)} 天</div>`;
  if(type==='placeholder')return'<div class="tba">待官方公告</div>';
  return`<div class="countdown"><div class="unit"><strong>${String(cd.d).padStart(2,'0')}</strong><span>天</span></div><div class="unit"><strong>${String(cd.h).padStart(2,'0')}</strong><span>小时</span></div><div class="unit"><strong>${String(cd.m).padStart(2,'0')}</strong><span>分钟</span></div></div>`;
}
function renderEvents(list){
  const el=document.getElementById('events');
  el.className=`events ${viewMode}`;
  if(!list.length){el.innerHTML='<div class="empty">没有匹配的游戏 DDL，换个关键词或专题试试。</div>';return}
  el.innerHTML=list.map(item=>{
    const style=styleOf(item),cd=parts(item),tags=(item.tags||[]).map(tag=>`<span class="tag">${tag}</span>`).join('');
    return`<article class="event" style="--tone:${style.tone}">
      <a class="preview" href="${item.url}" target="_blank" rel="noreferrer"><div><div class="domain">${domain(item.url)}</div><div class="source-title">${item.sourceLabel||item.source||style.name}</div></div><span class="source-chip">${style.icon}</span><span class="open">↗</span></a>
      <div class="body"><div class="kicker"><span>${labelOf(item)}</span><span class="stage">${item.stage||'Event'}</span><span>${item.dateRange}</span></div><h3>${item.title}</h3>${timePanel(item,cd)}<div class="desc">${item.description||''}</div><div class="tags">${tags}</div><div class="actions"><a class="btn primary" href="${item.url}" target="_blank" rel="noreferrer">查看官方来源 ↗</a></div></div>
    </article>`;
  }).join('');
}
function render(){const list=filtered();renderTabs();renderStats(list);renderEvents(list);document.querySelectorAll('[data-view]').forEach(btn=>btn.classList.toggle('active',btn.dataset.view===viewMode))}
document.querySelectorAll('[data-view]').forEach(btn=>btn.addEventListener('click',()=>{viewMode=btn.dataset.view;localStorage.setItem('game-ddl-view-mode',viewMode);render()}));
document.getElementById('search').addEventListener('input',event=>{query=event.target.value;render()});
window.addEventListener('hashchange',()=>{selected=location.hash.replace('#','')||'all';if(!topics[selected])selected='all';render()});
load();
setInterval(render,60000);
</script>
</body>
</html>
