name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
      - run: npm run crawl
      - run: npm run build
      - run: npm run link-check
        env:
          LINK_CHECK_TIMEOUT_MS: '4500'
      - name: Prepare Pages artifact
        run: |
          rm -rf dist
          mkdir -p dist
          cp index.html .nojekyll dist/
          cp -R public-data dist/public-data
          if [ -d docs ]; then cp -R docs dist/docs; fi
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v5
